<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" width="720" height="280">
  <defs>
    <linearGradient id="obg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF6EE"/>
      <stop offset="100%" style="stop-color:#EDE5CF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="280" fill="url(#obg)" rx="4"/>
  <rect x="8" y="8" width="704" height="264" rx="2" fill="none" stroke="#C8891A" stroke-width="0.5" opacity="0.3"/>

  <!-- Divider line -->
  <line x1="360" y1="30" x2="360" y2="210" stroke="#C8891A" stroke-width="1" opacity="0.2" stroke-dasharray="6,4"/>

  <!-- LEFT: Pasta generica (X) -->
  <g transform="translate(80, 35)">
    <text x="100" y="15" text-anchor="middle" font-family="'Lato', Helvetica, sans-serif" font-weight="900" font-size="13" fill="#8B2020" letter-spacing="1.5" opacity="0.7">PASTA GENERICA</text>

    <!-- Sad broken pasta -->
    <g transform="translate(50, 40)" opacity="0.35">
      <!-- Plate -->
      <ellipse cx="50" cy="100" rx="55" ry="16" fill="#8B2020" opacity="0.15"/>
      <ellipse cx="50" cy="97" rx="45" ry="13" fill="none" stroke="#8B2020" stroke-width="1" opacity="0.3"/>

      <!-- Broken pasta pieces -->
      <rect x="25" y="70" width="14" height="20" rx="2" fill="#8B2020" opacity="0.25" transform="rotate(-15, 32, 80)"/>
      <rect x="48" y="65" width="14" height="12" rx="2" fill="#8B2020" opacity="0.25" transform="rotate(10, 55, 71)"/>
      <rect x="65" y="72" width="10" height="18" rx="2" fill="#8B2020" opacity="0.25" transform="rotate(20, 70, 81)"/>
      <!-- Crack lines -->
      <path d="M40 78 L44 85 L38 90" stroke="#8B2020" stroke-width="1.5" opacity="0.3" fill="none" stroke-linecap="round"/>
    </g>

    <!-- X icon -->
    <g transform="translate(80, 145)" opacity="0.5">
      <circle cx="20" cy="12" r="16" fill="#8B2020" opacity="0.15"/>
      <path d="M12 4 L28 20 M28 4 L12 20" stroke="#8B2020" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- RIGHT: Minicozzi Chef Lab (check) -->
  <g transform="translate(400, 35)">
    <text x="120" y="15" text-anchor="middle" font-family="'Lato', Helvetica, sans-serif" font-weight="900" font-size="13" fill="#C8891A" letter-spacing="1.5" opacity="0.7">MINICOZZI CHEF LAB</text>

    <!-- Perfect pasta -->
    <g transform="translate(70, 40)" opacity="0.4">
      <!-- Plate -->
      <ellipse cx="50" cy="100" rx="55" ry="16" fill="#C8891A" opacity="0.2"/>
      <ellipse cx="50" cy="97" rx="45" ry="13" fill="none" stroke="#C8891A" stroke-width="1" opacity="0.4"/>

      <!-- Perfect paccheri standing -->
      <rect x="20" y="65" width="16" height="28" rx="4" fill="#C8891A" opacity="0.3"/>
      <rect x="42" y="62" width="16" height="28" rx="4" fill="#C8891A" opacity="0.3"/>
      <rect x="64" y="65" width="16" height="28" rx="4" fill="#C8891A" opacity="0.3"/>

      <!-- Steam -->
      <path d="M35 55 Q33 45 37 38" fill="none" stroke="#C8891A" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
      <path d="M50 52 Q48 40 52 32" fill="none" stroke="#C8891A" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
      <path d="M65 55 Q63 45 67 38" fill="none" stroke="#C8891A" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
    </g>

    <!-- Check icon -->
    <g transform="translate(100, 145)" opacity="0.5">
      <circle cx="20" cy="12" r="16" fill="#C8891A" opacity="0.2"/>
      <path d="M12 12 L18 18 L28 6" stroke="#C8891A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>

  <!-- VS badge -->
  <g transform="translate(347, 95)">
    <circle cx="13" cy="13" r="18" fill="#3D3828" opacity="0.8"/>
    <text x="13" y="18" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-weight="900" font-size="14" fill="#FAF6EE">vs</text>
  </g>

  <!-- Label -->
  <g transform="translate(360, 225)">
    <rect x="-80" y="-14" width="160" height="32" rx="3" fill="#3D3828" opacity="0.85"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Lato', Helvetica, sans-serif" font-weight="900" font-size="12" fill="#FAF6EE" letter-spacing="2">IL CONFRONTO</text>
  </g>

  <text x="360" y="265" text-anchor="middle" font-family="'Lato', Helvetica, sans-serif" font-size="11" fill="#8A8070" font-style="italic">Foto reale in arrivo</text>
</svg>