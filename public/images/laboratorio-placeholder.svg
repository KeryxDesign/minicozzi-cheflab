<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400">
  <defs>
    <pattern id="grain3" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="0.6" fill="rgba(120,100,70,0.08)"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="720" height="400" fill="#E8DFC9" rx="8"/>
  <rect width="720" height="400" fill="url(#grain3)" rx="8"/>

  <!-- Rolling pin icon (large) -->
  <g transform="translate(360,140)" opacity="0.3">
    <!-- Cylinder -->
    <rect x="-80" y="-18" width="160" height="36" rx="18" fill="#8A8070"/>
    <!-- Handles -->
    <rect x="-110" y="-10" width="35" height="20" rx="5" fill="#8A8070"/>
    <rect x="75" y="-10" width="35" height="20" rx="5" fill="#8A8070"/>
    <!-- Grip lines -->
    <line x1="-60" y1="-14" x2="-60" y2="14" stroke="#E8DFC9" stroke-width="1.5" opacity="0.4"/>
    <line x1="-30" y1="-17" x2="-30" y2="17" stroke="#E8DFC9" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#E8DFC9" stroke-width="1.5" opacity="0.4"/>
    <line x1="30" y1="-17" x2="30" y2="17" stroke="#E8DFC9" stroke-width="1.5" opacity="0.4"/>
    <line x1="60" y1="-14" x2="60" y2="14" stroke="#E8DFC9" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Wheat stalks -->
  <g transform="translate(200,100)" opacity="0.2">
    <line x1="0" y1="60" x2="0" y2="0" stroke="#8A8070" stroke-width="2"/>
    <ellipse cx="-6" cy="10" rx="5" ry="10" fill="#C8891A" transform="rotate(-20,-6,10)"/>
    <ellipse cx="6" cy="15" rx="5" ry="10" fill="#C8891A" transform="rotate(20,6,15)"/>
    <ellipse cx="-6" cy="28" rx="5" ry="10" fill="#C8891A" transform="rotate(-20,-6,28)"/>
    <ellipse cx="6" cy="33" rx="5" ry="10" fill="#C8891A" transform="rotate(20,6,33)"/>
  </g>
  <g transform="translate(520,90)" opacity="0.2">
    <line x1="0" y1="60" x2="0" y2="0" stroke="#8A8070" stroke-width="2"/>
    <ellipse cx="-6" cy="10" rx="5" ry="10" fill="#C8891A" transform="rotate(-20,-6,10)"/>
    <ellipse cx="6" cy="15" rx="5" ry="10" fill="#C8891A" transform="rotate(20,6,15)"/>
    <ellipse cx="-6" cy="28" rx="5" ry="10" fill="#C8891A" transform="rotate(-20,-6,28)"/>
    <ellipse cx="6" cy="33" rx="5" ry="10" fill="#C8891A" transform="rotate(20,6,33)"/>
  </g>

  <!-- Dough/flour surface suggestion -->
  <ellipse cx="360" cy="220" rx="120" ry="15" fill="#D4C9B0" opacity="0.3"/>

  <!-- Small pasta pieces scattered -->
  <g opacity="0.25">
    <rect x="280" y="195" width="14" height="22" rx="3" fill="#C8891A" transform="rotate(-10,287,206)"/>
    <rect x="320" y="190" width="14" height="22" rx="3" fill="#C8891A" transform="rotate(15,327,201)"/>
    <rect x="360" y="192" width="14" height="22" rx="3" fill="#C8891A" transform="rotate(-5,367,203)"/>
    <rect x="400" y="195" width="14" height="22" rx="3" fill="#C8891A" transform="rotate(20,407,206)"/>
    <rect x="430" y="193" width="14" height="22" rx="3" fill="#C8891A" transform="rotate(-15,437,204)"/>
  </g>

  <!-- Brand badge -->
  <circle cx="360" cy="310" r="40" fill="#1C1A14" opacity="0.75"/>
  <circle cx="360" cy="310" r="37" fill="none" stroke="#C8891A" stroke-width="1.5" opacity="0.6"/>
  <text x="360" y="305" font-family="Georgia, serif" font-size="11" fill="white" text-anchor="middle" font-weight="700" letter-spacing="1">MINICOZZI</text>
  <text x="360" y="320" font-family="Georgia, serif" font-size="10" fill="#C8891A" text-anchor="middle">ChefLab</text>

  <!-- Label below -->
  <rect x="215" y="365" width="290" height="25" rx="4" fill="#1C1A14" opacity="0.6"/>
  <text x="360" y="382" font-family="Arial, sans-serif" font-size="11" fill="#C8891A" text-anchor="middle">Il nostro laboratorio — Foto reale in arrivo</text>

  <!-- Corner decorations -->
  <path d="M20 20 L60 20 M20 20 L20 60" stroke="#C8891A" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M700 20 L660 20 M700 20 L700 60" stroke="#C8891A" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M20 380 L60 380 M20 380 L20 340" stroke="#C8891A" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M700 380 L660 380 M700 380 L700 340" stroke="#C8891A" stroke-width="2" fill="none" opacity="0.3"/>
</svg>