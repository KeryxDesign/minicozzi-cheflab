<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400">
  <defs>
    <pattern id="grain1" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="0.6" fill="rgba(120,100,70,0.08)"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="720" height="400" fill="#E8DFC9" rx="8"/>
  <rect width="720" height="400" fill="url(#grain1)" rx="8"/>

  <!-- Steam lines -->
  <g opacity="0.15" stroke="#8A8070" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M300 140 Q305 120 300 100 Q295 80 300 60"/>
    <path d="M340 130 Q345 110 340 90 Q335 70 340 50"/>
    <path d="M380 140 Q385 120 380 100 Q375 80 380 60"/>
    <path d="M420 135 Q425 115 420 95 Q415 75 420 55"/>
  </g>

  <!-- Plate (ellipse) -->
  <ellipse cx="360" cy="220" rx="140" ry="30" fill="#D4C9B0" opacity="0.5"/>
  <ellipse cx="360" cy="215" rx="130" ry="26" fill="#EDE5CF"/>
  <ellipse cx="360" cy="213" rx="115" ry="22" fill="#D4C9B0" opacity="0.3"/>

  <!-- Pasta on plate (stylized paccheri) -->
  <g transform="translate(360,200)">
    <!-- Pacchero 1 -->
    <rect x="-50" y="-25" width="22" height="35" rx="4" fill="#C8891A" opacity="0.6" transform="rotate(-15,-39,-8)"/>
    <!-- Pacchero 2 -->
    <rect x="-20" y="-30" width="22" height="35" rx="4" fill="#C8891A" opacity="0.7" transform="rotate(5,-9,-13)"/>
    <!-- Pacchero 3 -->
    <rect x="10" y="-25" width="22" height="35" rx="4" fill="#C8891A" opacity="0.6" transform="rotate(20,21,-8)"/>
    <!-- Pacchero 4 -->
    <rect x="-35" y="-10" width="22" height="35" rx="4" fill="#C8891A" opacity="0.5" transform="rotate(-30,-24,8)"/>
    <!-- Pacchero 5 -->
    <rect x="30" y="-15" width="22" height="35" rx="4" fill="#C8891A" opacity="0.5" transform="rotate(35,41,3)"/>
  </g>

  <!-- Fork -->
  <g transform="translate(480,170) rotate(25)" opacity="0.25">
    <rect x="-2" y="0" width="4" height="80" rx="2" fill="#8A8070"/>
    <rect x="-10" y="-20" width="3" height="25" rx="1.5" fill="#8A8070"/>
    <rect x="-4" y="-22" width="3" height="27" rx="1.5" fill="#8A8070"/>
    <rect x="2" y="-22" width="3" height="27" rx="1.5" fill="#8A8070"/>
    <rect x="8" y="-20" width="3" height="25" rx="1.5" fill="#8A8070"/>
  </g>

  <!-- Label -->
  <rect x="220" y="290" width="280" height="50" rx="6" fill="#1C1A14" opacity="0.75"/>
  <text x="360" y="312" font-family="Georgia, serif" font-size="14" fill="white" text-anchor="middle" letter-spacing="3" font-weight="700">PASTA IN SERVIZIO</text>
  <text x="360" y="330" font-family="Arial, sans-serif" font-size="11" fill="#C8891A" text-anchor="middle">Foto reale in arrivo</text>

  <!-- Corner decorations -->
  <path d="M20 20 L60 20 M20 20 L20 60" stroke="#C8891A" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M700 20 L660 20 M700 20 L700 60" stroke="#C8891A" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M20 380 L60 380 M20 380 L20 340" stroke="#C8891A" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M700 380 L660 380 M700 380 L700 340" stroke="#C8891A" stroke-width="2" fill="none" opacity="0.3"/>
</svg>