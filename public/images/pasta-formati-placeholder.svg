<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400">
  <defs>
    <pattern id="grain2" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="0.6" fill="rgba(120,100,70,0.08)"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="720" height="400" fill="#E8DFC9" rx="8"/>
  <rect width="720" height="400" fill="url(#grain2)" rx="8"/>

  <!-- Three pasta format sections -->

  <!-- Paccheri (left) -->
  <g transform="translate(160,160)">
    <rect x="-30" y="-40" width="24" height="38" rx="5" fill="none" stroke="#C8891A" stroke-width="2.5" opacity="0.7"/>
    <rect x="-2" y="-45" width="24" height="38" rx="5" fill="none" stroke="#C8891A" stroke-width="2.5" opacity="0.5"/>
    <rect x="20" y="-38" width="24" height="38" rx="5" fill="none" stroke="#C8891A" stroke-width="2.5" opacity="0.6"/>
    <!-- Filled accent -->
    <rect x="-16" y="-20" width="24" height="38" rx="5" fill="#C8891A" opacity="0.15"/>
    <text x="8" y="30" font-family="Georgia, serif" font-size="14" fill="#1C1A14" text-anchor="middle" font-weight="700" opacity="0.7">Paccheri</text>
  </g>

  <!-- Fusilloni (center) -->
  <g transform="translate(360,160)">
    <!-- Spiral shapes -->
    <g opacity="0.6">
      <path d="M-15,-40 Q-25,-30 -15,-20 Q-5,-10 -15,0 Q-25,10 -15,20" stroke="#C8891A" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M-10,-40 Q0,-30 -10,-20 Q-20,-10 -10,0 Q0,10 -10,20" stroke="#C8891A" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
    <g opacity="0.5" transform="translate(25,0)">
      <path d="M-15,-35 Q-25,-25 -15,-15 Q-5,-5 -15,5 Q-25,15 -15,25" stroke="#C8891A" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M-10,-35 Q0,-25 -10,-15 Q-20,-5 -10,5 Q0,15 -10,25" stroke="#C8891A" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
    <text x="0" y="50" font-family="Georgia, serif" font-size="14" fill="#1C1A14" text-anchor="middle" font-weight="700" opacity="0.7">Fusilloni</text>
  </g>

  <!-- Ravioli (right) -->
  <g transform="translate(560,160)">
    <g opacity="0.6">
      <!-- Raviolo 1 -->
      <rect x="-40" y="-30" width="36" height="36" rx="4" fill="none" stroke="#C8891A" stroke-width="2.5" transform="rotate(45,-22,-12)"/>
      <!-- Raviolo 2 -->
      <rect x="0" y="-25" width="36" height="36" rx="4" fill="none" stroke="#C8891A" stroke-width="2.5" transform="rotate(45,18,-7)" opacity="0.5"/>
    </g>
    <!-- Fill accent -->
    <rect x="-20" y="-15" width="36" height="36" rx="4" fill="#C8891A" opacity="0.12" transform="rotate(45,-2,3)"/>
    <text x="0" y="55" font-family="Georgia, serif" font-size="14" fill="#1C1A14" text-anchor="middle" font-weight="700" opacity="0.7">Ravioli</text>
  </g>

  <!-- Divider line -->
  <line x1="120" y1="250" x2="600" y2="250" stroke="#C8891A" stroke-width="1" opacity="0.3"/>

  <!-- Label -->
  <rect x="195" y="280" width="330" height="50" rx="6" fill="#1C1A14" opacity="0.75"/>
  <text x="360" y="302" font-family="Georgia, serif" font-size="14" fill="white" text-anchor="middle" letter-spacing="3" font-weight="700">FORMATI SU MISURA</text>
  <text x="360" y="320" font-family="Arial, sans-serif" font-size="11" fill="#C8891A" text-anchor="middle">Foto reale in arrivo</text>

  <!-- Corner decorations -->
  <path d="M20 20 L60 20 M20 20 L20 60" stroke="#C8891A" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M700 20 L660 20 M700 20 L700 60" stroke="#C8891A" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M20 380 L60 380 M20 380 L20 340" stroke="#C8891A" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M700 380 L660 380 M700 380 L700 340" stroke="#C8891A" stroke-width="2" fill="none" opacity="0.3"/>
</svg>