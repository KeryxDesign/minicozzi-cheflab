<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" width="720" height="300">
  <defs>
    <linearGradient id="tbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF6EE"/>
      <stop offset="100%" style="stop-color:#EDE5CF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="300" fill="url(#tbg)" rx="4"/>
  <rect x="8" y="8" width="704" height="284" rx="2" fill="none" stroke="#C8891A" stroke-width="0.5" opacity="0.3"/>

  <!-- Left: Restaurant interior suggestion -->
  <g transform="translate(100, 60)">
    <!-- Table -->
    <rect x="0" y="100" width="120" height="6" rx="2" fill="#C8891A" opacity="0.5"/>
    <rect x="10" y="106" width="4" height="50" rx="1" fill="#C8891A" opacity="0.4"/>
    <rect x="106" y="106" width="4" height="50" rx="1" fill="#C8891A" opacity="0.4"/>

    <!-- Plate on table -->
    <ellipse cx="60" cy="90" rx="32" ry="10" fill="#C8891A" opacity="0.15"/>
    <ellipse cx="60" cy="88" rx="26" ry="8" fill="none" stroke="#C8891A" stroke-width="1" opacity="0.3"/>

    <!-- Steam lines -->
    <path d="M50 75 Q48 65 52 58" fill="none" stroke="#C8891A" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
    <path d="M60 72 Q58 60 62 52" fill="none" stroke="#C8891A" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
    <path d="M70 75 Q68 65 72 58" fill="none" stroke="#C8891A" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

    <!-- Wine glass -->
    <path d="M15 70 L15 90" stroke="#C8891A" stroke-width="1" opacity="0.3"/>
    <path d="M8 90 L22 90" stroke="#C8891A" stroke-width="1" opacity="0.3"/>
    <path d="M9 55 Q9 70 15 70 Q21 70 21 55" fill="#C8891A" fill-opacity="0.1" stroke="#C8891A" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Center: Quote marks -->
  <g transform="translate(320, 80)">
    <text x="0" y="0" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="80" fill="#C8891A" opacity="0.2">"</text>
  </g>

  <!-- Right: Star ratings -->
  <g transform="translate(460, 80)">
    <g transform="translate(0, 0)">
      <polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9" fill="#C8891A" opacity="0.4" transform="scale(0.8)"/>
    </g>
    <g transform="translate(20, 0)">
      <polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9" fill="#C8891A" opacity="0.4" transform="scale(0.8)"/>
    </g>
    <g transform="translate(40, 0)">
      <polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9" fill="#C8891A" opacity="0.4" transform="scale(0.8)"/>
    </g>
    <g transform="translate(60, 0)">
      <polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9" fill="#C8891A" opacity="0.4" transform="scale(0.8)"/>
    </g>
    <g transform="translate(80, 0)">
      <polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9" fill="#C8891A" opacity="0.4" transform="scale(0.8)"/>
    </g>

    <!-- Chef hat icon -->
    <g transform="translate(20, 50)" opacity="0.35">
      <path d="M10 35 L10 25 Q0 20 0 12 Q0 0 15 0 Q20 0 25 5 Q30 0 35 0 Q50 0 50 12 Q50 20 40 25 L40 35 Z" fill="#C8891A" transform="scale(0.9)"/>
    </g>
  </g>

  <!-- Label -->
  <g transform="translate(360, 230)">
    <rect x="-110" y="-14" width="220" height="32" rx="3" fill="#3D3828" opacity="0.85"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Lato', Helvetica, sans-serif" font-weight="900" font-size="12" fill="#FAF6EE" letter-spacing="2">FOTO RISTORANTI IN ARRIVO</text>
  </g>

  <!-- Subtitle -->
  <text x="360" y="272" text-anchor="middle" font-family="'Lato', Helvetica, sans-serif" font-size="11" fill="#8A8070" font-style="italic">Scatti reali dai ristoranti partner</text>
</svg>