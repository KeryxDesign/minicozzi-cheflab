<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" width="720" height="280">
  <defs>
    <linearGradient id="ubg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF6EE"/>
      <stop offset="100%" style="stop-color:#EDE5CF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="280" fill="url(#ubg)" rx="4"/>
  <rect x="8" y="8" width="704" height="264" rx="2" fill="none" stroke="#C8891A" stroke-width="0.5" opacity="0.3"/>

  <!-- Hands making pasta -->
  <g transform="translate(160, 40)" opacity="0.35">
    <!-- Rolling pin -->
    <rect x="0" y="60" width="160" height="12" rx="6" fill="#C8891A"/>
    <!-- Handles -->
    <rect x="-15" y="58" width="20" height="16" rx="4" fill="#C8891A" opacity="0.7"/>
    <rect x="155" y="58" width="20" height="16" rx="4" fill="#C8891A" opacity="0.7"/>
    <!-- Dough sheet -->
    <path d="M10 75 Q80 85 150 75 L150 90 Q80 100 10 90 Z" fill="#C8891A" opacity="0.4"/>
    <!-- Flour dots -->
    <circle cx="30" cy="50" r="2" fill="#C8891A" opacity="0.3"/>
    <circle cx="60" cy="45" r="1.5" fill="#C8891A" opacity="0.3"/>
    <circle cx="90" cy="48" r="2.5" fill="#C8891A" opacity="0.3"/>
    <circle cx="120" cy="52" r="1.5" fill="#C8891A" opacity="0.3"/>
    <circle cx="140" cy="44" r="2" fill="#C8891A" opacity="0.3"/>
  </g>

  <!-- Clock icon (limited time) -->
  <g transform="translate(480, 50)" opacity="0.3">
    <circle cx="40" cy="40" r="35" fill="none" stroke="#C8891A" stroke-width="2.5"/>
    <line x1="40" y1="40" x2="40" y2="18" stroke="#C8891A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="40" y1="40" x2="58" y2="40" stroke="#C8891A" stroke-width="2" stroke-linecap="round"/>
    <circle cx="40" cy="40" r="3" fill="#C8891A"/>
    <!-- Hour markers -->
    <circle cx="40" cy="10" r="2" fill="#C8891A"/>
    <circle cx="70" cy="40" r="2" fill="#C8891A"/>
    <circle cx="40" cy="70" r="2" fill="#C8891A"/>
    <circle cx="10" cy="40" r="2" fill="#C8891A"/>
  </g>

  <!-- Cut pasta shapes -->
  <g transform="translate(420, 140)" opacity="0.25">
    <!-- Pacchero shapes -->
    <rect x="0" y="0" width="18" height="22" rx="3" fill="none" stroke="#C8891A" stroke-width="2"/>
    <rect x="28" y="5" width="18" height="22" rx="3" fill="none" stroke="#C8891A" stroke-width="2"/>
    <rect x="56" y="2" width="18" height="22" rx="3" fill="none" stroke="#C8891A" stroke-width="2"/>
    <rect x="84" y="8" width="18" height="22" rx="3" fill="none" stroke="#C8891A" stroke-width="2"/>
  </g>

  <!-- Label -->
  <g transform="translate(360, 210)">
    <rect x="-120" y="-14" width="240" height="32" rx="3" fill="#3D3828" opacity="0.85"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Lato', Helvetica, sans-serif" font-weight="900" font-size="12" fill="#FAF6EE" letter-spacing="2">IL LABORATORIO AL LAVORO</text>
  </g>

  <text x="360" y="255" text-anchor="middle" font-family="'Lato', Helvetica, sans-serif" font-size="11" fill="#8A8070" font-style="italic">Foto reale in arrivo</text>
</svg>